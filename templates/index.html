<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Name Entity Recognition</title>
    <!-- Google Fonts for Inter -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #0f172a;
            --surface: rgba(30, 41, 59, 0.7);
            --border: rgba(255, 255, 255, 0.1);
            --text-primary: #f8fafc;
            --text-secondary: #94a3b8;
            --accent: #8b5cf6;
            --glow: rgba(139, 92, 246, 0.4);
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-color);
            background-image: 
                radial-gradient(circle at 15% 50%, rgba(139, 92, 246, 0.15) 0%, transparent 40%),
                radial-gradient(circle at 85% 30%, rgba(56, 189, 248, 0.15) 0%, transparent 40%);
            color: var(--text-primary);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            padding-top: 5rem;
            padding-bottom: 5rem;
        }

        .main-container {
            width: 100%;
            max-width: 800px;
            padding: 0 20px;
            box-sizing: border-box;
        }

        h1 {
            text-align: center;
            font-weight: 700;
            font-size: 2.5rem;
            margin-bottom: 2rem;
            background: linear-gradient(135deg, #f8fafc 0%, #cbd5e1 100%);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: 0 4px 20px rgba(0,0,0,0.1);
        }

        .glass-panel {
            background: var(--surface);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.3);
            margin-bottom: 2rem;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }
        
        .upload-area {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .file-input-wrapper {
            position: relative;
            border: 2px dashed rgba(139, 92, 246, 0.4);
            border-radius: 12px;
            padding: 40px 20px;
            text-align: center;
            transition: all 0.3s ease;
            background: rgba(15, 23, 42, 0.4);
            cursor: pointer;
        }

        .file-input-wrapper:hover {
            border-color: var(--accent);
            background: rgba(15, 23, 42, 0.6);
            transform: translateY(-2px);
            box-shadow: 0 8px 24px rgba(139, 92, 246, 0.15);
        }

        .file-input-wrapper input[type="file"] {
            position: absolute;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            opacity: 0;
            cursor: pointer;
            z-index: 10;
        }

        .file-input-text {
            color: var(--text-secondary);
            font-size: 1.1rem;
            pointer-events: none;
        }

        .file-input-icon {
            font-size: 2.5rem;
            margin-bottom: 12px;
            display: block;
            pointer-events: none;
            opacity: 0.8;
        }

        .btn-submit {
            background: linear-gradient(135deg, #8b5cf6 0%, #6366f1 100%);
            color: white;
            border: none;
            padding: 16px 32px;
            border-radius: 12px;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 8px 20px var(--glow);
            width: 100%;
            letter-spacing: 0.5px;
        }

        .btn-submit:hover {
            transform: translateY(-3px);
            box-shadow: 0 12px 25px var(--glow);
            background: linear-gradient(135deg, #7c3aed 0%, #4f46e5 100%);
        }
        
        .btn-submit:active {
            transform: translateY(1px);
        }

        .results-section {
            display: flex;
            flex-direction: column;
            gap: 20px;
            animation: fadeIn 0.6s cubic-bezier(0.16, 1, 0.3, 1);
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(15px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .result-group {
            background: rgba(15, 23, 42, 0.5);
            border-radius: 14px;
            padding: 24px;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .result-title {
            color: var(--accent);
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            margin-bottom: 14px;
            margin-top: 0;
            font-weight: 700;
        }

        .original-text {
            color: var(--text-primary);
            line-height: 1.7;
            margin: 0;
            font-size: 1.05rem;
        }

        .entity-text {
            color: var(--text-primary);
            line-height: 2.2;
            margin: 0;
            font-size: 1.05rem;
        }

        /* Override SpaCy displaCy defaults to look premium */
        .entities {
            line-height: 2.4 !important;
            color: var(--text-primary) !important;
        }
        
        .entity {
            /* Keep original pastel background but force dark text */
            color: #0f172a !important; 
            padding: 0.3em 0.6em !important;
            border-radius: 8px !important;
            margin: 0 0.15em !important;
            display: inline-flex !important;
            align-items: center !important;
            box-shadow: 0 2px 6px rgba(0,0,0,0.15) !important;
            transition: transform 0.2s ease, box-shadow 0.2s ease !important;
            border: 1px solid rgba(0,0,0,0.05) !important;
            font-weight: 500 !important;
        }
        
        .entity:hover {
            transform: translateY(-2px) !important;
            box-shadow: 0 6px 12px rgba(0,0,0,0.2) !important;
        }

        .entity span {
            font-size: 0.65em !important;
            margin-left: 0.7em !important;
            font-weight: 800 !important;
            color: rgba(15, 23, 42, 0.75) !important;
            text-transform: uppercase !important;
            letter-spacing: 0.5px !important;
        }

        .alert-warning {
            color: #fb923c;
            background: rgba(251, 146, 60, 0.1);
            border: 1px solid rgba(251, 146, 60, 0.2);
            padding: 16px;
            border-radius: 12px;
            text-align: center;
            font-weight: 500;
        }
    </style>
</head>
<body>
    <div class="main-container">
        <h1>Name Entity Recognition</h1>
        
        <div class="glass-panel">
            <form action="/entity" method="post" enctype="multipart/form-data" class="upload-area">
                <div class="file-input-wrapper">
                    <span class="file-input-icon">📄</span>
                    <div class="file-input-text">
                        <span id="file-name" style="font-weight: 600; color: #f8fafc;">Click to upload a document</span><br>
                        <small style="font-size: 0.9rem; margin-top: 8px; display: inline-block;">PDF, DOCX, CSV, or Text</small>
                    </div>
                    <input type="file" name="file" id="file" accept=".pdf,.docx,.csv,.txt" required onchange="updateFileName(this)">
                </div>
                <button type="submit" class="btn-submit">Analyze Entities ✨</button>
            </form>
        </div>

        {% if html or text %}
        <div class="glass-panel results-section">
            {% if text %}
            <div class="result-group">
                <h3 class="result-title">Original Text</h3>
                <div class="original-text">{{text|safe}}</div>
            </div>
            {% endif %}
            
            {% if html %}
            <div class="result-group">
                <h3 class="result-title">Extracted Entities</h3>
                <div class="entity-text">{{html|safe}}</div>
            </div>
            {% endif %}
        </div>
        {% endif %}
    </div>

    <script>
        function updateFileName(input) {
            const fileNameDisplay = document.getElementById('file-name');
            if (input.files && input.files[0]) {
                fileNameDisplay.textContent = 'Selected File: ' + input.files[0].name;
                fileNameDisplay.style.color = '#8b5cf6';
            } else {
                fileNameDisplay.textContent = 'Click to upload a text file';
                fileNameDisplay.style.color = '#f8fafc';
            }
        }
    </script>
</body>
</html>
